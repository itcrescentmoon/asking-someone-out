<!doctype html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Asking Someone Out</title>

        <style>
            body{
                margin: 0;
                height: 100vh;
                background: blueviolet;
                font-family: Arial, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden;

            }
            .card{
                background: white;
                width: 280px;
                max-width: 300px;
                padding: 20px;
                border-radius: 20px;
                box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
                text-align: center;

            }
            .heart{
                font-size: medium;
                animation: beat 1s infinite;

            }
            h1{
                color: #ff4f9a;
                margin: 15px 0;

            }
            h2{
                color: #333;
                margin-top: 25px;
                font-size: 18px;
            }
            p{
                color: #555;
                font-size: 15px;
                line-height: 1.5;
            }
            .buttons{
                margin-top: 25px;
                height: 80px;
                position: relative;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .button-style{
                border: none;
                padding: 12px 20px;
                border-radius: 30px;
                font-size: 14px;
                font-weight: bold;
                cursor: pointer;
                transition: transform 0.2s ease;
                
            }
            #yessBtn{
                background: #ff4f9a;
                color: white;
                transform: translateX(-50px);
            }
            #yessBtn:hover{
                transform: translateX(-50px) scale(1.1);
                background: #ff4f9a;

            }
            #nooBtn{
                background: #ccc;
                color: #333;
                position: absolute;
                transform: translateX(50px);
                z-index: 10;
            }
            #smallText{
                font-size: 10px;
                color: #888;
                margin-top: 15px;
            }

            @keyframes beat {
                0%, 100%{
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.25);
                }
            }
        </style>
    </head>

    <body>
        <div class="card">
            <div class="heart">❤️</div>
            
            <h1>Haii crush</h1>
            
            <p id="message">
                Sebab saya buat web ni adalah sebab saya ada perasaan terhadap anda😁
            </p>

            <h2>Nak tak keluar dengan saya bila ada masa luang</h2>
            
            <div class="buttons">
                <button id="yessBtn" class="button-style">yess😁 </button>
                <button id="nooBtn" class="button-style">noo😒</button>
            </div>
            <p id="smallText">thing before you click no😅</p>
            
        </div>

        <script>
            const yessBtn=document.getElementById('yessBtn');
            const nooBtn=document.getElementById('nooBtn');
            const smallText=document.getElementById('smallText');

            let noCount=0;

            function moveNoButton(e){
                if(e) e.preventDefault();
                noCount++;

                const padding = 50;
                const maxX = window.innerWidth - nooBtn.offsetWidth - padding;
                const maxY = window.innerHeight - nooBtn.offsetHeight - padding;

                const randomX = Math.floor(Math.random() * maxX);
                const randomY = Math.floor(Math.random() * maxY);

                nooBtn.style.position = "fixed";
                nooBtn.style.transform = "none";
                nooBtn.style.left = `${randomX}px`;
                nooBtn.style.top = `${randomY}px`;

                if(noCount === 1){
                    smallText.textContent = "jangan la tekan no 😅"
                }else if(noCount === 2){
                    smallText.textContent = "yakin ka no ya 😂"
                }else if(noCount === 3){
                    smallText.textContent = "nampak nya button no pun tau kita di takdir bersama 😂"
                }else if(noCount === 4){
                    smallText.textContent = "tekan la yess ya jangan la malu 🤣"
                }                
            }

            if(nooBtn && yessBtn){
                nooBtn.addEventListener("mouseenter", (e)=> moveNoButton(e));
                nooBtn.addEventListener("touchstart", (e)=> moveNoButton(e), {passive:false});

                yessBtn.addEventListener("click", ()=>{
                    document.body.innerHTML=`
                        <div class="card">
                            <div class="heart">❤️</div>
                            <h1>horeee!!😁😁</h1>
                            <p>I know you like me</p>
                            <h2>YEAYYY YOUR MINE AND ONLY NOW 😁😈</h2>
                        </div>
                    `;
                });
            }
        </script>
        

    </body>
</html>
